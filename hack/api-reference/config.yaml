processor:
  ignoreFields:
    - "TypeMeta"
  ignoreTypes:
    - "ParseError$"
    - "List$"

render:
  kubernetesVersion: "1.33"
  knownTypes:
    - name: Quantity
      package: k8s.io/apimachinery/pkg/api/resource
      link: https://pkg.go.dev/k8s.io/apimachinery/pkg/api/resource#Quantity
    - name: Duration
      package: k8s.io/apimachinery/pkg/apis/meta/v1
      link: https://pkg.go.dev/k8s.io/apimachinery/pkg/apis/meta/v1#Duration
    - name: RawExtension
      package: k8s.io/apimachinery/pkg/runtime
      link: https://pkg.go.dev/k8s.io/apimachinery/pkg/runtime#RawExtension
    - name: IntOrString
      package: k8s.io/apimachinery/pkg/util/intstr
      link: https://pkg.go.dev/k8s.io/apimachinery/pkg/util/intstr#IntOrString